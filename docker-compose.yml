name: expedia-hackathon-2026

services:
  redis:
    image: redis:7-alpine
    container_name: hackathon_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hackathon_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hackathon_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - sqlite_data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - hackathon_net
    # Non-root user is set in the Dockerfile (USER appuser)
    # DATABASE_URL comes from .env (defaults to local SQLite file under
    # /app/data — persisted via the sqlite_data volume). To move to
    # PostgreSQL/Supabase, set DATABASE_URL / DATABASE_URL_SYNC in .env
    # to the target connection string; no changes needed here.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hackathon_frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - hackathon_net

networks:
  hackathon_net:
    driver: bridge

volumes:
  redisdata:
  sqlite_data:
